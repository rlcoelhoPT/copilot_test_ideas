<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Meme Generator</h1>
      <p class="subtitle">Create and share your memes</p>
    </header>

    <main class="layout">
      <!-- Controls Panel -->
      <aside class="controls">

        <section class="control-section">
          <h2>Image</h2>
          <label class="file-label" for="image-upload">
            <span>&#128193; Choose Image</span>
            <input type="file" id="image-upload" accept="image/*">
          </label>
        </section>

        <section class="control-section">
          <h2>Text</h2>
          <div class="field">
            <label for="top-text">Top Text</label>
            <input type="text" id="top-text" placeholder="TOP TEXT" maxlength="100">
          </div>
          <div class="field">
            <label for="bottom-text">Bottom Text</label>
            <input type="text" id="bottom-text" placeholder="BOTTOM TEXT" maxlength="100">
          </div>
        </section>

        <section class="control-section">
          <h2>Style</h2>
          <div class="field-row">
            <div class="field">
              <label for="text-color">Color</label>
              <input type="color" id="text-color" value="#ffffff">
            </div>
            <div class="field">
              <label for="text-size">Size (px)</label>
              <input type="number" id="text-size" value="40" min="10" max="150" step="2">
            </div>
          </div>
          <div class="field">
            <label for="font-family">Font</label>
            <select id="font-family">
              <option value="Impact">Impact</option>
              <option value="Arial Black">Arial Black</option>
              <option value="Arial">Arial</option>
              <option value="Comic Sans MS">Comic Sans MS</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Courier New">Courier New</option>
              <option value="Georgia">Georgia</option>
              <option value="Verdana">Verdana</option>
              <option value="Trebuchet MS">Trebuchet MS</option>
            </select>
          </div>
        </section>

        <section class="control-section actions">
          <button id="save-btn" class="btn btn-primary">&#128190; Save Meme</button>
          <div class="share-row">
            <button id="share-twitter" class="btn btn-twitter">&#120143; Twitter</button>
            <button id="share-reddit" class="btn btn-reddit">Reddit</button>
          </div>
        </section>

        <p class="drag-hint">&#128161; Drag text on the canvas to reposition it</p>
      </aside>

      <!-- Canvas -->
      <div class="canvas-wrap">
        <canvas id="meme-canvas" width="620" height="480"></canvas>
      </div>
    </main>
  </div>

  <script src="meme-generator.js"></script>
</body>
</html>
